[workspace]
members = [
    "components/*",
    "runners/embedded",
    "runners/nkpk",
    "runners/usbip",
    "utils/collect-license-info",
    "utils/gen-commands-bd",
]
resolver = "2"

[workspace.package]
version = "1.8.0"

[patch.crates-io]
# components
memory-regions = { path = "components/memory-regions" }

# forked
admin-app = { git = "https://github.com/Nitrokey/admin-app.git", branch = "trussed-core" }
fido-authenticator = { git = "https://github.com/Nitrokey/fido-authenticator.git", branch = "trussed-core" }
trussed = { git = "https://github.com/trussed-dev/trussed.git", branch = "mechanism-check" }
trussed-core = { git = "https://github.com/trussed-dev/trussed.git", branch = "mechanism-check" }

# unreleased upstream changes
ctaphid-dispatch = { git = "https://github.com/trussed-dev/ctaphid-dispatch.git", branch = "trussed-core" }
usbd-ctaphid = { git = "https://github.com/trussed-dev/usbd-ctaphid.git", branch = "trussed-core" }
usbd-ccid = { git = "https://github.com/Nitrokey/usbd-ccid", tag = "v0.2.0-nitrokey.1" }
p256-cortex-m4  = { git = "https://github.com/ycrypto/p256-cortex-m4.git", rev = "cdb31e12594b4dc1f045b860a885fdc94d96aee2" }

# unreleased crates
secrets-app = { git = "https://github.com/Nitrokey/trussed-secrets-app", branch = "trussed-core" }
webcrypt = { git = "https://github.com/nitrokey/nitrokey-websmartcard-rust", tag = "v0.8.0-rc10" }
opcard = { git = "https://github.com/Nitrokey/opcard-rs", branch = "trussed-core" }
piv-authenticator = { git = "https://github.com/Nitrokey/piv-authenticator.git", branch = "trussed-core" }
trussed-fs-info = { git = "https://github.com/trussed-dev/trussed-staging.git", branch = "trussed-core" }
trussed-chunked = { git = "https://github.com/trussed-dev/trussed-staging.git", branch = "trussed-core" }
trussed-manage = { git = "https://github.com/trussed-dev/trussed-staging.git", branch = "trussed-core" }
trussed-wrap-key-to-file = { git = "https://github.com/trussed-dev/trussed-staging.git", branch = "trussed-core" }
trussed-staging = { git = "https://github.com/trussed-dev/trussed-staging.git", branch = "trussed-core" }
trussed-auth = { git = "https://github.com/trussed-dev/trussed-auth", branch = "trussed-core" }
trussed-hkdf = { git = "https://github.com/trussed-dev/trussed-staging.git", branch = "trussed-core" }
trussed-hpke = { git = "https://github.com/trussed-dev/trussed-staging.git", branch = "trussed-core" }
trussed-rsa-alloc = { git = "https://github.com/trussed-dev/trussed-rsa-backend.git", branch = "trussed-core" }
trussed-usbip = { git = "https://github.com/Nitrokey/pc-usbip-runner.git", tag = "v0.0.1-nitrokey.5" }
trussed-se050-manage = { git = "https://github.com/Nitrokey/trussed-se050-backend.git", branch = "trussed-core" }
trussed-se050-backend = { git = "https://github.com/Nitrokey/trussed-se050-backend.git", branch = "trussed-core" }

[profile.release]
codegen-units = 1
lto = "fat"
opt-level = "z"
incremental = false
debug = true

[profile.release-thin-lto]
lto = "thin"
inherits = "release"

[profile.release.package.salty]
opt-level = 2

[profile.release-thin-lto.package.salty]
opt-level = 2
